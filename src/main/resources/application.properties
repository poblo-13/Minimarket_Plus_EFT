spring.application.name=minimarket
spring.config.import=optional:file:.env[.properties]

# Configuracion de H2 en memoria
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# Configuracion de JPA e Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Seed demo configurable por variables de entorno o archivo .env en formato KEY=value.
app.seed.enabled=${APP_SEED_ENABLED:true}
app.admin.username=${APP_ADMIN_USERNAME:admin}
app.admin.password=${APP_ADMIN_PASSWORD:admin123}
app.cajero.username=${APP_CAJERO_USERNAME:cajero}
app.cajero.password=${APP_CAJERO_PASSWORD:cajero123}
app.cliente.username=${APP_CLIENTE_USERNAME:cliente}
app.cliente.password=${APP_CLIENTE_PASSWORD:cliente123}
