# Development-only H2 database and demo accounts.
spring.datasource.url=jdbc:h2:mem:minimarket-dev
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

app.seed.enabled=true
app.admin.username=${APP_ADMIN_USERNAME:admin}
app.admin.password=${APP_ADMIN_PASSWORD:admin123}
app.cajero.username=${APP_CAJERO_USERNAME:cajero}
app.cajero.password=${APP_CAJERO_PASSWORD:cajero123}
app.cliente.username=${APP_CLIENTE_USERNAME:cliente}
app.cliente.password=${APP_CLIENTE_PASSWORD:cliente123}
