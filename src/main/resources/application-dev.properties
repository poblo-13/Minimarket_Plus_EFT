# Development-only H2 database and deterministic synthetic video-demo data.
spring.datasource.url=jdbc:h2:mem:minimarket-dev
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# The dev-only seed is opt-in. Its credentials must be supplied through DEMO_* environment variables.
app.seed.enabled=${DEMO_SEED_ENABLED:false}
