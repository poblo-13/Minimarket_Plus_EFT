# Development-only H2 database and deterministic synthetic video-demo data.
spring.datasource.url=jdbc:h2:mem:minimarket-dev
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

app.seed.enabled=true
# Local demo credentials only. Override them through APP_* variables; passwords are BCrypt-encoded on seed.
app.admin.username=${APP_ADMIN_USERNAME:admin_demo}
app.admin.password=${APP_ADMIN_PASSWORD:local-admin-demo-2026}
app.cajero.username=${APP_CAJERO_USERNAME:cajero_demo}
app.cajero.password=${APP_CAJERO_PASSWORD:local-cajero-demo-2026}
app.cliente.username=${APP_CLIENTE_USERNAME:cliente_demo}
app.cliente.password=${APP_CLIENTE_PASSWORD:local-cliente-demo-2026}
